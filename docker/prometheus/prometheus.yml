global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: products
    metrics_path: /metrics
    static_configs:
      - targets: ["products:3001"]

  - job_name: notifications
    metrics_path: /metrics
    static_configs:
      - targets: ["notifications:3002"]
